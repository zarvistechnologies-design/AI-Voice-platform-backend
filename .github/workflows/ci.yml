name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      NODE_ENV: development
      MONGODB_URI: mongodb://127.0.0.1:27017/ai-voice-platform-ci
      JWT_SECRET: ci-only-secret
      INTEGRATION_ENCRYPTION_KEY: ci-only-encryption-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run smoke:phase5
      - run: npm run smoke:phase6
      - run: npm run smoke:phase7
      - run: npm run smoke:phase8
